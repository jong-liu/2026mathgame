<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幾何神探</title>
<style>
  :root{
    --bg:#0f201a;--board:#142b22;--chalk:#f4f1e9;--chalk-dim:#b8c2bb;
    --accent:#ffae42;--accent-soft:#ffce8a;--good:#7fd1ae;--bad:#ff7b72;--line:#3a5346;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--chalk);font-family:"Segoe UI","Microsoft JhengHei","PingFang TC",sans-serif;line-height:1.5;min-height:100vh;padding:16px 14px 60px;}
  .wrap{max-width:880px;margin:0 auto;}
  h1{text-align:center;font-size:2rem;margin:.1em 0;color:var(--accent);letter-spacing:3px;text-shadow:0 1px 0 rgba(0,0,0,.4);}
  .subtitle{text-align:center;color:var(--chalk-dim);margin:.2em 0 16px;font-size:.95rem;}

  .stages{display:flex;justify-content:center;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .stage-chip{border:1px solid var(--line);border-radius:20px;padding:4px 12px;font-size:.82rem;color:var(--chalk-dim);background:var(--board);white-space:nowrap;}
  .stage-chip.active{border-color:var(--accent);color:var(--accent);font-weight:bold;}
  .stage-chip.done{color:var(--good);border-color:var(--good);}

  .hud{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;background:var(--board);border:1px solid var(--line);border-radius:10px;padding:8px 14px;margin-bottom:14px;font-size:.95rem;}
  .hud b{color:var(--accent);}
  .timer.low{color:var(--bad)!important;}

  .panel{background:var(--board);border:1px solid var(--line);border-radius:14px;padding:18px;text-align:center;}
  .prompt{font-size:1.05rem;margin:0 0 10px;}
  .prompt strong{color:var(--accent);}
  .given-box{background:rgba(255,255,255,.03);border:1px dashed var(--line);border-radius:10px;padding:9px 14px;margin:0 auto 12px;max-width:560px;text-align:left;font-size:.95rem;color:var(--accent-soft);}
  .meta{color:var(--chalk-dim);font-size:.85rem;font-style:italic;margin-top:10px;}
  .fig-row{display:flex;justify-content:center;margin:6px 0 10px;}
  .fig-row svg{max-width:280px;width:100%;height:auto;display:block;}

  details.ref{background:var(--board);border:1px solid var(--line);border-radius:12px;padding:4px 14px;margin-bottom:14px;}
  details.ref summary{cursor:pointer;font-weight:bold;color:var(--accent-soft);padding:6px 4px;list-style:none;display:flex;align-items:center;gap:9px;}
  details.ref summary::-webkit-details-marker{display:none;}
  /* 自製動畫箭頭：未開時上下跳動吸引注意，展開後旋轉朝上並停止 */
  details.ref summary::before{content:"";flex:0 0 auto;width:12px;height:12px;border-right:3px solid var(--accent);border-bottom:3px solid var(--accent);border-radius:2px;transform:rotate(45deg);transition:transform .3s ease;animation:refBounce 1.05s ease-in-out infinite;}
  details.ref[open] summary::before{transform:rotate(-135deg);animation:none;}
  details.ref summary::after{content:"輕觸展開 👆";font-size:.74rem;color:var(--accent);font-weight:bold;margin-left:6px;animation:refBlink 1.05s ease-in-out infinite;}
  details.ref[open] summary::after{content:"";animation:none;}
  details.ref:not([open]){animation:refGlow 1.6s ease-in-out infinite;}
  @keyframes refBounce{0%,100%{transform:rotate(45deg) translate(0,0);}50%{transform:rotate(45deg) translate(3px,3px);}}
  @keyframes refBlink{0%,100%{opacity:.35;}50%{opacity:1;}}
  @keyframes refGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,174,66,0);}50%{box-shadow:0 0 14px 2px rgba(255,174,66,.5);}}
  .ref-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;padding:8px 0 12px;}
  .ref-card{border:1px solid var(--line);border-radius:10px;padding:10px;background:rgba(255,255,255,.02);}
  .ref-card b{color:var(--accent);}
  .ref-card .zh{color:var(--chalk-dim);font-size:.8rem;}
  .ref-card p{margin:.4em 0 0;font-size:.84rem;}

  .answers{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
  @media(max-width:480px){.answers{grid-template-columns:repeat(2,1fr);}}
  .ans{background:transparent;border:2px solid var(--accent);color:var(--accent-soft);border-radius:10px;padding:11px 6px;font-size:.92rem;font-weight:bold;cursor:pointer;transition:transform .08s,background .15s;font-family:inherit;}
  .ans small{display:block;font-weight:normal;font-size:.7rem;color:var(--chalk-dim);margin-top:2px;}
  .ans:hover:not(:disabled){background:rgba(255,174,66,.12);transform:translateY(-2px);}
  .ans:disabled{cursor:default;}
  .ans.correct{background:rgba(127,209,174,.18);border-color:var(--good);color:var(--good);}
  .ans.wrong{background:rgba(255,123,114,.16);border-color:var(--bad);color:var(--bad);}

  .forks{display:flex;flex-direction:column;gap:10px;max-width:520px;margin:12px auto 0;}
  .fork{text-align:left;background:transparent;border:2px solid var(--line);color:var(--chalk);border-radius:10px;padding:11px 14px;font-size:.95rem;cursor:pointer;font-family:inherit;}
  .fork:hover:not(:disabled){border-color:var(--accent);background:rgba(255,174,66,.08);}
  .fork.correct{border-color:var(--good);color:var(--good);background:rgba(127,209,174,.14);}
  .fork.wrong{border-color:var(--bad);color:var(--bad);background:rgba(255,123,114,.12);}
  .fork:disabled{cursor:default;}

  .feedback{margin-top:12px;min-height:24px;text-align:left;max-width:600px;margin-left:auto;margin-right:auto;}
  .verdict{font-weight:bold;font-size:1.05rem;}
  .verdict.ok{color:var(--good);}
  .verdict.no{color:var(--bad);}
  .why{color:var(--chalk-dim);margin-top:4px;font-size:.92rem;}

  .controls{margin-top:14px;}
  .btn{background:var(--accent);color:#2a1c05;border:none;border-radius:10px;padding:11px 28px;font-size:1rem;font-weight:bold;cursor:pointer;font-family:inherit;}
  .btn:hover{background:var(--accent-soft);}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--chalk-dim);}
  .hidden{display:none;}

  .countdown-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;}
  .countdown-num{font-size:2.8rem;font-weight:bold;color:var(--good);font-variant-numeric:tabular-nums;line-height:1;min-width:62px;text-align:center;transition:color .2s;}
  .countdown-num.warn{color:var(--bad);animation:cpulse .5s ease-in-out infinite alternate;}
  @keyframes cpulse{from{transform:scale(1);}to{transform:scale(1.18);}}
  .countdown-track{flex:1;max-width:260px;height:7px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;}
  .countdown-fill{height:100%;background:var(--good);border-radius:4px;transition:width .9s linear,background .3s;}
  .countdown-fill.warn{background:var(--bad);}
  .monster{font-size:2.4rem;transition:transform .25s,opacity .25s;height:42px;}
  .monster.pop{transform:scale(1.6) rotate(20deg);opacity:0;}

  .badge{font-size:4rem;}
  .big{font-size:2.4rem;color:var(--accent);font-weight:bold;}
  .review{text-align:left;max-width:520px;margin:12px auto;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:10px;padding:12px 16px;}
  .review h3{margin:.2em 0;color:var(--accent-soft);font-size:1rem;}
  .review li{color:var(--chalk-dim);font-size:.9rem;margin:4px 0;}
  .win-title{text-align:center;font-size:1.3rem;color:var(--accent);font-weight:bold;margin:0 0 12px;}
  .scene-wrap{position:relative;max-width:760px;margin:0 auto;border-radius:14px;overflow:hidden;box-shadow:0 12px 36px rgba(0,0,0,.55);border:1px solid var(--line);}
  .scene-wrap svg.scene{width:100%;height:auto;display:block;}
  .fw-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
  .firework{position:absolute;width:0;height:0;}
  .firework span{position:absolute;left:0;top:0;width:5px;height:5px;border-radius:50%;background:var(--fc);box-shadow:0 0 9px 2px var(--fc);opacity:0;transform:rotate(var(--a)) translateY(0) scale(1);animation:fwburst 1.9s ease-out infinite;animation-delay:var(--dl);}
  @keyframes fwburst{0%,5%{transform:rotate(var(--a)) translateY(0) scale(.6);opacity:0;}12%{opacity:1;}55%{opacity:1;}100%{transform:rotate(var(--a)) translateY(var(--d)) scale(.25);opacity:0;}}
  .win-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .numin{font-size:1.2rem;width:110px;text-align:center;padding:8px;border-radius:8px;border:2px solid var(--accent);background:var(--bg);color:var(--chalk);font-family:inherit;}
  .unit{font-size:1.1rem;color:var(--chalk-dim);margin-left:6px;}
  .hint{text-align:center;color:var(--chalk-dim);font-size:.78rem;margin-top:16px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>🔍 幾何神探</h1>
  <p class="subtitle">中垂線 · 角平分線 · 外心 · 內心 — 看圖識性質</p>

  <details class="ref">
    <summary>性質速覽（隨時可開）</summary>
    <div class="ref-grid">
      <div class="ref-card"><b>中垂線性質</b><p>P 在 AB 中垂線上<br>⟹ <b style="color:var(--accent-soft)">PA = PB</b></p></div>
      <div class="ref-card"><b>中垂線逆定理</b><p>PA = PB<br>⟹ P 在 <b style="color:var(--accent-soft)">AB 中垂線上</b></p></div>
      <div class="ref-card"><b>角平分線性質</b><p>P 在 ∠AOB 角平分線上<br>⟹ P 到<b style="color:var(--accent-soft)">兩邊等距</b></p></div>
      <div class="ref-card"><b>角平分線逆定理</b><p>P 在角內且到兩邊等距<br>⟹ P 在<b style="color:var(--accent-soft)">角平分線上</b></p></div>
      <div class="ref-card"><b>外心</b><p>三邊中垂線交於外心 O<br>⟹ <b style="color:var(--accent-soft)">OA = OB = OC</b>（外接圓半徑）</p></div>
      <div class="ref-card"><b>內心</b><p>三角平分線交於內心 I<br>⟹ I 到<b style="color:var(--accent-soft)">三邊等距</b>（內切圓半徑）</p></div>
    </div>
  </details>

  <div class="stages" id="stages"></div>
  <div class="hud" id="hud"></div>
  <div id="stage"></div>
  <p class="hint">鍵盤 1–6 作答 · Enter 下一題</p>
</div>

<script>
/* ===== SVG 繪圖工具 ===== */
const W=260,H=210;
function mk(body){return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${body}</svg>`;}
function seg(x1,y1,x2,y2,c='var(--chalk)',sw=2.4,dash=''){
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${c}" stroke-width="${sw}" stroke-linecap="round"${dash?` stroke-dasharray="${dash}"`:''}/>`;}
function dot(x,y,r=4.5,fill='var(--chalk)'){return `<circle cx="${x}" cy="${y}" r="${r}" fill="${fill}"/>`;}
function lbl(x,y,t,dx=0,dy=0,size=14){return `<text x="${x+dx}" y="${y+dy}" text-anchor="middle" font-size="${size}" font-weight="bold" fill="var(--chalk)">${t}</text>`;}
function tickSeg(x1,y1,x2,y2,n=1){
  const mx=(x1+x2)/2,my=(y1+y2)/2,l=Math.hypot(x2-x1,y2-y1)||1;
  const ux=(x2-x1)/l,uy=(y2-y1)/l,px=-uy,py=ux,L=7,g=5;
  let s='';for(let i=0;i<n;i++){const o=(i-(n-1)/2)*g,cx=mx+ux*o,cy=my+uy*o;
    s+=`<line x1="${(cx+px*L/2).toFixed(1)}" y1="${(cy+py*L/2).toFixed(1)}" x2="${(cx-px*L/2).toFixed(1)}" y2="${(cy-py*L/2).toFixed(1)}" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>`;} return s;}
function raMark(Vx,Vy,Px,Py,Qx,Qy,sz=11){
  const l1=Math.hypot(Px-Vx,Py-Vy)||1,l2=Math.hypot(Qx-Vx,Qy-Vy)||1;
  const u1x=(Px-Vx)/l1,u1y=(Py-Vy)/l1,u2x=(Qx-Vx)/l2,u2y=(Qy-Vy)/l2;
  const ax=Vx+u1x*sz,ay=Vy+u1y*sz,cx=Vx+u2x*sz,cy=Vy+u2y*sz;
  return `<path d="M${ax.toFixed(1)},${ay.toFixed(1)} L${(ax+u2x*sz).toFixed(1)},${(ay+u2y*sz).toFixed(1)} L${cx.toFixed(1)},${cy.toFixed(1)}" fill="none" stroke="var(--accent)" stroke-width="2"/>`;
}
function arcMark(Vx,Vy,Px,Py,Qx,Qy,n=1,rb=20){
  const a0=Math.atan2(Py-Vy,Px-Vx),a1=Math.atan2(Qy-Vy,Qx-Vx);
  let da=a1-a0;while(da>Math.PI)da-=2*Math.PI;while(da<-Math.PI)da+=2*Math.PI;
  let s='';for(let k=0;k<n;k++){const r=rb+k*5;let path='';
    for(let i=0;i<=16;i++){const a=a0+da*i/16;path+=(i?'L':'M')+`${(Vx+Math.cos(a)*r).toFixed(1)},${(Vy+Math.sin(a)*r).toFixed(1)} `;}
    s+=`<path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2.2"/>`;} return s;}
function footPt(Px,Py,Ax,Ay,Bx,By){
  const dx=Bx-Ax,dy=By-Ay,t=((Px-Ax)*dx+(Py-Ay)*dy)/(dx*dx+dy*dy);
  return[Ax+t*dx,Ay+t*dy];}

/* ===== 圖形繪製函式 ===== */
// 1. 中垂線性質（P在中垂線上 → PA=PB）
function figPerpProp(){
  const A=[40,158],B=[218,158],M=[129,158],P=[129,55];
  return mk(
    seg(A[0],A[1],B[0],B[1])+
    seg(129,18,129,182,'var(--chalk-dim)',1.5,'5,4')+
    raMark(M[0],M[1],P[0],P[1],B[0],B[1])+
    dot(A[0],A[1])+lbl(A[0],A[1],'A',-14,5)+
    dot(B[0],B[1])+lbl(B[0],B[1],'B',14,5)+
    dot(M[0],M[1])+lbl(M[0],M[1],'M',0,18)+
    dot(P[0],P[1])+lbl(P[0],P[1],'P',0,-12)
  );}
// 2. 中垂線逆定理（PA=PB → P在中垂線上）
function figPerpInv(){
  // P 的 x = AB 中點 x =129，PA=PB 嚴格成立（等刻線才真實）
  const A=[48,172],B=[210,172],P=[129,50];
  return mk(
    seg(A[0],A[1],B[0],B[1])+
    seg(A[0],A[1],P[0],P[1])+tickSeg(A[0],A[1],P[0],P[1],1)+
    seg(B[0],B[1],P[0],P[1])+tickSeg(B[0],B[1],P[0],P[1],1)+
    dot(A[0],A[1])+lbl(A[0],A[1],'A',-13,5)+
    dot(B[0],B[1])+lbl(B[0],B[1],'B',13,5)+
    dot(P[0],P[1])+lbl(P[0],P[1],'P',0,-12)
  );}
// 3. 角平分線性質（P在角平分線上 → 到兩邊等距）
function figAngProp(){
  // O=[32,180], R1=[220,60], R2=[220,180]
  // 真正角平分線方向 = unit(OR1)+unit(OR2) → End=[224,124]，P 在平分線上 t=110 → [138,149]
  const O=[32,180],R1=[220,60],R2=[220,180],End=[224,124],P=[138,149];
  return mk(
    seg(O[0],O[1],R1[0],R1[1])+
    seg(O[0],O[1],R2[0],R2[1])+
    seg(O[0],O[1],End[0],End[1],'var(--chalk-dim)',1.6,'4,3')+
    arcMark(O[0],O[1],R1[0],R1[1],End[0],End[1],1)+
    arcMark(O[0],O[1],End[0],End[1],R2[0],R2[1],1)+
    dot(O[0],O[1])+lbl(O[0],O[1],'O',-13,0)+
    dot(P[0],P[1])+lbl(P[0],P[1],'P',0,-12)
  );}
// 4. 角平分線逆定理（到兩邊等距 → P在角平分線上）
function figAngInv(){
  // P 在角平分線上才能使 PF1=PF2 幾何正確（P=[138,149] 使 PF1≈PF2≈31）
  const O=[32,180],R1=[220,60],R2=[220,180],P=[138,149];
  const F1=footPt(P[0],P[1],O[0],O[1],R1[0],R1[1]);
  const F2=footPt(P[0],P[1],O[0],O[1],R2[0],R2[1]);
  return mk(
    seg(O[0],O[1],R1[0],R1[1])+
    seg(O[0],O[1],R2[0],R2[1])+
    seg(P[0],P[1],F1[0],F1[1],'var(--chalk-dim)',1.6,'3,3')+
    seg(P[0],P[1],F2[0],F2[1],'var(--chalk-dim)',1.6,'3,3')+
    tickSeg(P[0],P[1],F1[0],F1[1],1)+tickSeg(P[0],P[1],F2[0],F2[1],1)+
    raMark(F1[0],F1[1],O[0],O[1],P[0],P[1])+
    raMark(F2[0],F2[1],O[0],O[1],P[0],P[1])+
    dot(O[0],O[1])+lbl(O[0],O[1],'O',-13,0)+
    dot(P[0],P[1])+lbl(P[0],P[1],'P',12,-6)+
    dot(F1[0],F1[1],3.5)+dot(F2[0],F2[1],3.5)
  );}
// 5. 外心（三中垂線交點）— O=(130,143) 為 △ABC 真正外心，三中垂線確實交於此
function figCircum(){
  const A=[50,178],B=[210,178],C=[150,58],O=[130,143];
  const Mab=[130,178],Mac=[100,118],Mbc=[180,118]; // 三邊中點
  // 各中垂線：中點→O 方向延伸成虛線
  function bis(M){
    const dx=O[0]-M[0],dy=O[1]-M[1],l=Math.hypot(dx,dy)||1,ux=dx/l,uy=dy/l;
    return seg(M[0]-ux*12,M[1]-uy*12,O[0]+ux*18,O[1]+uy*18,'var(--chalk-dim)',1.5,'5,4');
  }
  return mk(
    seg(A[0],A[1],B[0],B[1])+seg(B[0],B[1],C[0],C[1])+seg(C[0],C[1],A[0],A[1])+
    bis(Mab)+bis(Mac)+bis(Mbc)+
    raMark(Mab[0],Mab[1],O[0],O[1],B[0],B[1])+
    raMark(Mac[0],Mac[1],O[0],O[1],C[0],C[1])+
    raMark(Mbc[0],Mbc[1],O[0],O[1],C[0],C[1])+
    dot(A[0],A[1])+lbl(A[0],A[1],'A',-13,5)+
    dot(B[0],B[1])+lbl(B[0],B[1],'B',13,5)+
    dot(C[0],C[1])+lbl(C[0],C[1],'C',0,-12)+
    dot(O[0],O[1],5,'var(--accent)')+lbl(O[0],O[1],'O',13,5)
  );}
// 6. 內心（三角平分線交點）
function figIncen(){
  // I=(148,136) 為 △ABC 真正內心：到 AB、BC 距離皆≈49（等距才真實）
  const A=[42,185],B=[218,185],C=[165,42],I=[148,136];
  const F1=footPt(I[0],I[1],A[0],A[1],B[0],B[1]);
  const F2=footPt(I[0],I[1],B[0],B[1],C[0],C[1]);
  return mk(
    seg(A[0],A[1],B[0],B[1])+seg(B[0],B[1],C[0],C[1])+seg(C[0],C[1],A[0],A[1])+
    seg(I[0],I[1],F1[0],F1[1],'var(--chalk-dim)',1.5,'3,3')+tickSeg(I[0],I[1],F1[0],F1[1],1)+
    seg(I[0],I[1],F2[0],F2[1],'var(--chalk-dim)',1.5,'3,3')+tickSeg(I[0],I[1],F2[0],F2[1],1)+
    raMark(F1[0],F1[1],A[0],A[1],I[0],I[1])+
    raMark(F2[0],F2[1],B[0],B[1],I[0],I[1])+
    dot(A[0],A[1])+lbl(A[0],A[1],'A',-13,5)+
    dot(B[0],B[1])+lbl(B[0],B[1],'B',13,5)+
    dot(C[0],C[1])+lbl(C[0],C[1],'C',12,-6)+
    dot(I[0],I[1],5,'var(--accent)')+lbl(I[0],I[1],'I',-14,0)
  );}
// 7. 陷阱：只有中點，沒有垂直
function figTrapMid(){
  const A=[42,140],B=[218,140],M=[130,140],P=[90,68];
  return mk(
    seg(A[0],A[1],B[0],B[1])+
    tickSeg(A[0],A[1],M[0],M[1],1)+tickSeg(M[0],M[1],B[0],B[1],1)+

/* ===== 音效 ===== */
const AC=new(window.AudioContext||window.webkitAudioContext)();
function resumeAC(){if(AC.state==="suspended")AC.resume();}
function sndCorrect(){
  resumeAC();const t=AC.currentTime;
  [[523,.05],[659,.1],[784,.18],[1047,.28]].forEach(([f,dt])=>{
    const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);
    o.type="sine";o.frequency.value=f;
    g.gain.setValueAtTime(0,t+dt);g.gain.linearRampToValueAtTime(.22,t+dt+.03);
    g.gain.exponentialRampToValueAtTime(.001,t+dt+.28);o.start(t+dt);o.stop(t+dt+.3);});}
function sndWrong(){
  resumeAC();const t=AC.currentTime;
  const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);
  o.type="sawtooth";o.frequency.setValueAtTime(220,t);o.frequency.linearRampToValueAtTime(140,t+.22);
  g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.32);}
function sndBeep(){
  resumeAC();const t=AC.currentTime;
  const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);
  o.type="square";o.frequency.value=880;
  g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);o.start(t);o.stop(t+.2);}
function sndFireworks(n){
  resumeAC();
  const FX_COLORS=['#ff4d6d','#ffd166','#4cc9f0','#06d6a0','#c77dff','#f72585','#ffb703','#80ffdb','#ff7b00','#b5179e'];
  for(let i=0;i<Math.min(n,10);i++){
    setTimeout(()=>{
      const t=AC.currentTime;
      const w=AC.createOscillator(),wg=AC.createGain();w.connect(wg);wg.connect(AC.destination);
      w.type="sine";w.frequency.setValueAtTime(400,t);w.frequency.linearRampToValueAtTime(1800,t+.35);
      wg.gain.setValueAtTime(.12,t);wg.gain.exponentialRampToValueAtTime(.001,t+.38);w.start(t);w.stop(t+.4);
      const buf=AC.createBuffer(1,Math.floor(AC.sampleRate*.6),AC.sampleRate);
      const ch=buf.getChannelData(0);for(let k=0;k<ch.length;k++)ch[k]=Math.random()*2-1;
      const src=AC.createBufferSource(),bg=AC.createGain(),filt=AC.createBiquadFilter();
      filt.type="bandpass";filt.frequency.value=800+Math.random()*600;filt.Q.value=0.6;
      src.buffer=buf;src.connect(filt);filt.connect(bg);bg.connect(AC.destination);
      bg.gain.setValueAtTime(.35,t+.36);bg.gain.exponentialRampToValueAtTime(.001,t+.9);src.start(t+.36);src.stop(t+1);
    },i*420);}
}

/* ===== 遊戲狀態 ===== */
const STAGES=[{key:"village",label:"🟢 新手村"},{key:"level1",label:"🟡 配對挑戰"},{key:"level2",label:"🔵 證明迷宮"},{key:"boss",label:"🔴 Boss"}];
const state={screen:"start",stageIdx:0,shards:0,errorTally:{PERP_PROP:0,PERP_INV:0,ANG_PROP:0,ANG_INV:0,CIRCUM:0,NONE:0},
  timerId:null,vIdx:0,village:[],l1Time:60,l1Defeat:0,mIdx:0,maze:null,boss:null,bossAngle:0,bossPart:0};
const L1_TOTAL=60;

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function clearTimer(){if(state.timerId){clearInterval(state.timerId);state.timerId=null;}}

function buildVillage(){
  return VILLAGE_ORDER.map(r=>shuffle(BANK.filter(q=>q.rule===r))[0]);
}

/* ===== 渲染工具 ===== */
const $stage=document.getElementById("stage");
function renderHUD(){
  document.getElementById("stages").innerHTML=STAGES.map((s,i)=>{
    let cls="stage-chip";
    if(i<state.stageIdx)cls+=" done";
    else if(i===state.stageIdx&&state.screen!=="start"&&state.screen!=="win")cls+=" active";
    return`<span class="${cls}">${s.label}</span>`;
  }).join("");
  let hud=`<span>🔺 碎片 <b>${state.shards}</b></span>`;
  if(state.screen==="level1")hud+=`<span class="timer${state.l1Time<=10?" low":""}" id="timerDisp">⏱️ ${state.l1Time}s</span><span>擊倒 <b>${state.l1Defeat}</b></span>`;
  document.getElementById("hud").innerHTML=hud;
}
function answersHTML(){
  return`<div class="answers">`+OPTS.map(o=>{
    const ri=RULE_INFO[o.v];
    return`<button class="ans" data-v="${o.v}">${ri.short}<small>${ri.zh}</small></button>`;
  }).join("")+`</div>`;}
function bindAnswers(q,cb){
  document.querySelectorAll(".ans").forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll(".ans").forEach(x=>{x.disabled=true;if(x.dataset.v===q.rule)x.classList.add("correct");});
      const chosen=b.dataset.v,ok=chosen===q.rule;
      if(ok){sndCorrect();}else{b.classList.add("wrong");state.errorTally[q.rule]++;sndWrong();}
      cb(ok,chosen);
    };
  });}
function updateCountdownUI(){
  const t=state.l1Time,warn=t<=5;
  const hd=document.getElementById("timerDisp");
  if(hd){hd.textContent=`⏱️ ${t}s`;hd.className="timer"+(t<=10?" low":"");}
  const num=document.getElementById("cdNum"),fill=document.getElementById("cdFill");
  if(num){num.textContent=t;num.className="countdown-num"+(warn?" warn":"");}
  if(fill){fill.style.width=`${(t/L1_TOTAL)*100}%`;fill.className="countdown-fill"+(warn?" warn":"");}
}

/* ===== 🟢 新手村 ===== */
function renderVillage(){
  clearTimer();state.screen="village";renderHUD();

  </div>`;
  bindAnswers(q,(ok)=>{
    const ri=RULE_INFO[q.rule];
    document.getElementById("fb").innerHTML=ok
      ?`<div class="verdict ok">✔ ${ri.short}（${ri.zh}）！獲得一塊碎片 🔺</div><div class="why">${q.why}</div>`

    state.l1Time--;updateCountdownUI();

      {t:"SSS（三邊相等）",ok:true},{t:"SAS（兩邊及夾角）",ok:false,hint:"沒有夾角的條件。"},{t:"ASA（兩角及夾邊）",ok:false,hint:"沒有角的條件。"}]}
  ]},
  {given:"已知：I 是 △ABC 角平分線交點（內心），ID ⊥ AB、IE ⊥ BC。　目標：證明 ID = IE。",steps:[
    {q:"I 是 △ABC 內心，I 在 ∠B 的角平分線上，先推出什麼？",opts:[
      {t:"I 到 AB 的距離 = I 到 BC 的距離",ok:true},{t:"I 到 AB 的距離 = I 到 AC 的距離",ok:false,hint:"這是利用 ∠A 的角平分線得出的，不是 ∠B。"},{t:"IB = IA",ok:false,hint:"角平分線性質說的是到邊的距離相等，不是到頂點。"}]},
    {q:"ID ⊥ AB 且 IE ⊥ BC，所以 ID 和 IE 分別代表什麼？",opts:[
      {t:"I 到 AB 和 BC 的垂直距離",ok:true},{t:"ID 和 IE 是角平分線的長度",ok:false,hint:"這兩條是垂線段，不是角平分線。"},{t:"I 到兩頂點的距離",ok:false,hint:"到頂點的距離不是這裡標記的量。"}]},
    {q:"綜合以上，可以推出什麼？",opts:[
      {t:"ID = IE（因為都等於 I 到邊的距離）",ok:true},{t:"∠DIB = ∠EIB",ok:false,hint:"角度關係不直接從這裡推出。"},{t:"△IDB ≅ △IEB（ASA）",ok:false,hint:"需要先確認距離相等，才能作為條件。"}]}
  ]},
  {given:"已知：PA = PB，QA = QB。　目標：證明 P、Q 都在 AB 的中垂線上。",steps:[
    {q:"PA = PB，由中垂線哪個定理可推出結論？",opts:[
      {t:"中垂線逆定理：P 在 AB 的中垂線上",ok:true},{t:"中垂線性質：PA = PB → P 是中點",ok:false,hint:"中垂線上的點不一定是中點。"},{t:"無法推出任何結論",ok:false,hint:"PA = PB 已經是中垂線逆定理的條件。"}]},
    {q:"同理 QA = QB，可推出什麼？",opts:[
      {t:"Q 也在 AB 的中垂線上",ok:true},{t:"Q 是 AB 的中點",ok:false,hint:"中垂線逆定理說的是 Q 在中垂線上，不一定是中點。"},{t:"QP ⊥ AB",ok:false,hint:"這個結論需要額外條件。"}]},
    {q:"P 和 Q 都在 AB 中垂線上，意味著什麼？",opts:[
      {t:"PQ 就在 AB 的中垂線上（兩點決定一條線）",ok:true},{t:"PQ ∥ AB",ok:false,hint:"不一定平行。"},{t:"PQ = AB",ok:false,hint:"無法推出長度相等。"}]}
  ]}
];

function renderLevel2(){
  clearTimer();state.screen="level2";renderHUD();
  const steps=state.maze.steps,step=steps[state.mIdx],opts=shuffle(step.opts);
  $stage.innerHTML=`<div class="panel">
    <p class="prompt">🔵 證明迷宮 —— 岔路 ${state.mIdx+1}/${steps.length}</p>
    <div class="given-box">📜 ${state.maze.given}</div>
    <p class="prompt" style="font-size:1.02rem">${step.q}</p>
    <div class="forks" id="forks">${opts.map((o,i)=>`<button class="fork" data-i="${i}">${o.t}</button>`).join("")}</div>
    <div class="feedback" id="fb"></div>
    <div class="controls"><button class="btn hidden" id="next">前進 ▶</button></div>
  </div>`;
  const forks=document.querySelectorAll(".fork");
  forks.forEach(f=>f.onclick=()=>{
    const o=opts[+f.dataset.i];
    if(o.ok){
      forks.forEach(x=>x.disabled=true);f.classList.add("correct");sndCorrect();
      document.getElementById("fb").innerHTML=`<div class="verdict ok">✔ 這條路通了！</div>`;
      document.getElementById("next").classList.remove("hidden");
    }else{
      f.classList.add("wrong");f.disabled=true;sndWrong();
      document.getElementById("fb").innerHTML=`<div class="verdict no">✘ 走進死路</div><div class="why">${o.hint}</div>`;
    }
  });
  document.getElementById("next").onclick=()=>{
    state.mIdx++;
    if(state.mIdx>=steps.length){state.shards++;state.stageIdx=3;state.bossPart=0;renderBoss();}
    else renderLevel2();
  };
}

function renderBoss(){
  clearTimer();state.screen="boss";renderHUD();
  const scn=state.boss;
  if(state.bossPart===0){
    $stage.innerHTML=`<div class="panel">
      <p class="big">🔴 Boss：${scn.title}</p>
      <div class="given-box">📜 ${scn.given}</div>
      <div class="fig-row">${scn.figFn()}</div>
      <p class="prompt">${scn.q1}</p>
      ${answersHTML()}
      <div class="feedback" id="fb"></div>
      <div class="controls"><button class="btn hidden" id="next">下一小題 ▶</button></div>
    </div>`;
    document.querySelectorAll(".ans").forEach(b=>{
      b.onclick=()=>{
        const chosen=b.dataset.v;
        if(chosen===scn.rule){
          document.querySelectorAll(".ans").forEach(x=>x.disabled=true);b.classList.add("correct");sndCorrect();
          document.getElementById("fb").innerHTML=`<div class="verdict ok">✔ ${RULE_INFO[scn.rule].zh}！</div><div class="why">${scn.ruleWhy}</div>`;
          document.getElementById("next").classList.remove("hidden");
        }else{
          b.classList.add("wrong");b.disabled=true;state.errorTally[scn.rule]++;sndWrong();
          document.getElementById("fb").innerHTML=`<div class="verdict no">✘ 再想想，答案是「${RULE_INFO[scn.rule].zh}」</div><div class="why">${scn.ruleWhy}</div>`;
        }
      };
    });
    document.getElementById("next").onclick=()=>{state.bossPart=1;renderBoss();};
  }else{
    $stage.innerHTML=`<div class="panel">
      <div class="fig-row">${scn.figFn()}</div>
      <div class="given-box">📜 ${scn.given}</div>
      <p class="prompt">${scn.q2Prompt}</p>
      <div><input class="numin" id="ans" type="number" placeholder="?"><span class="unit">${scn.unit}</span></div>
      <div class="feedback" id="fb"></div>
      <div class="controls">
        <button class="btn" id="check">確認答案</button>
        <button class="btn hidden" id="winbtn">完成狩獵 🏅</button>
      </div>
    </div>`;
    document.getElementById("check").onclick=()=>{
      const v=parseFloat(document.getElementById("ans").value);
      if(v===scn.answer){
        state.shards++;renderHUD();sndCorrect();
        document.getElementById("fb").innerHTML=`<div class="verdict ok">✔ 答對！答案是 ${scn.answer}${scn.unit}</div><div class="why">${scn.solveHint}</div>`;
        document.getElementById("check").classList.add("hidden");
        document.getElementById("winbtn").classList.remove("hidden");
      }else{
        sndWrong();
        document.getElementById("fb").innerHTML=`<div class="verdict no">還不對喔</div><div class="why">${scn.solveHint}</div>`;
      }
    };
    document.getElementById("winbtn").onclick=renderWin;
  }
}

function fireworksHTML(n){
  const FW=['#ff4d6d','#ffd166','#4cc9f0','#06d6a0','#c77dff','#f72585','#ffb703','#80ffdb','#ff7b00','#b5179e'];
  let s=`<div class="fw-layer">`;
  for(let i=0;i<n;i++){
    const c=FW[i%FW.length];
    const x=(8+Math.random()*80).toFixed(1),y=(5+Math.random()*40).toFixed(1),dist=(50+Math.random()*30).toFixed(0);
    let spans="";for(let k=0;k<14;k++)spans+=`<span style="--a:${(k*360/14).toFixed(1)}deg"></span>`;
    s+=`<div class="firework" style="left:${x}%;top:${y}%;--fc:${c};--d:-${dist}px;--dl:${(i*0.42).toFixed(2)}s">${spans}</div>`;
  }
  return s+`</div>`;}

function renderWin(){
  clearTimer();state.screen="win";state.stageIdx=4;renderHUD();
  sndFireworks(state.shards);
  const review={PERP_PROP:"複習：中垂線上的點到兩端點等距。",PERP_INV:"複習：到兩端點等距 ⟹ 在中垂線上（逆定理）。",ANG_PROP:"複習：角平分線上的點到兩邊等距。",ANG_INV:"複習：角內到兩邊等距 ⟹ 在角平分線上（逆定理）。",CIRCUM:"複習：外心到三頂點等距（外接圓半徑）。",NONE:"複習：條件不足時不能強行套用性質！"};
  const errs=Object.entries(state.errorTally).filter(([,n])=>n>0).sort((a,b)=>b[1]-a[1]);
  const reviewHTML=errs.length===0
    ?`<div class="review"><h3>📊 學習追蹤</h3><li>全程零失誤，六大性質完全掌握！</li></div>`
    :`<div class="review"><h3>📊 學習追蹤：建議複習</h3>${errs.map(([r,n])=>`<li>・${RULE_INFO[r].zh}（錯 ${n} 次）：${review[r]}</li>`).join("")}</div>`;
  $stage.innerHTML=`<div class="panel">
    <p class="win-title">🎉 通關！你是本班的幾何神探 · 第一名 🎉</p>
    <div class="scene-wrap">${sceneSVG()}${fireworksHTML(state.shards)}</div>
    <p class="prompt" style="margin-top:14px">蒐集了 <strong>${state.shards}</strong> 塊碎片 🔺，為你綻放 <strong>${state.shards}</strong> 發繽紛煙火！</p>
    ${reviewHTML}
    <div class="controls win-actions">
      <button class="btn" id="again">再挑戰一次 🔄</button>
      <button class="btn ghost" id="leave">離開 🚪</button>
    </div>
  </div>`;
  document.getElementById("again").onclick=()=>{newRun();renderStart();};
  document.getElementById("leave").onclick=()=>{
    $stage.innerHTML=`<div class="panel"><div class="badge">🌅</div><p class="big">掰掰！</p><p class="prompt">感謝遊玩《幾何神探》，帶著第一名的好心情離開吧。<br><span class="meta">（可直接關閉此分頁）</span></p><div class="controls"><button class="btn ghost" id="back">回首頁</button></div></div>`;
    document.getElementById("back").onclick=()=>{newRun();renderStart();};
    try{window.close();}catch(e){}
  };
}

/* ===== 起始 / 重玩 ===== */
function newRun(){
  clearTimer();
  state.shards=0;state.vIdx=0;state.mIdx=0;state.bossPart=0;state.stageIdx=0;
  state.l1Time=60;state.l1Defeat=0;
  state.errorTally={PERP_PROP:0,PERP_INV:0,ANG_PROP:0,ANG_INV:0,CIRCUM:0,NONE:0};
  state.village=buildVillage();
  state.maze=shuffle(MAZES)[0];
  state.boss=shuffle(BOSS_SCENARIOS)[0];
}
function renderStart(){
  state.screen="start";renderHUD();

}

/* 鍵盤 */
document.addEventListener("keydown",e=>{
  if(e.key>="1"&&e.key<="6"){const all=document.querySelectorAll(".ans");const i=+e.key-1;if(all[i]&&!all[i].disabled)all[i].click();}
  if((e.key==="Enter"||e.key===" ")&&document.getElementById("next")&&!document.getElementById("next").classList.contains("hidden"))document.getElementById("next").click();
});

newRun();
renderStart();
